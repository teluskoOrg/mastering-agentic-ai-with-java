spring.application.name=springboot-pdf-rag


# pushed to a repo must be treated as leaked and rotated.
spring.ai.openai.api-key=
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.retry.enabled=false

# pgvector. Configured here rather than with a hand-built @Bean: defining our
# own vectorStore bean collides with the starter's auto-configured one, which
# is what forced spring.main.allow-bean-definition-overriding before.
# dimensions must match the embedding model (text-embedding-3-small = 1536)
# and the VECTOR(1536) column in schema.sql.


spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# schema.sql owns the tables, so the store must not create its own.
spring.ai.vectorstore.pgvector.initialize-schema=false

# Ingestion
# PDFs dropped here are ingested at startup. Re-scanning is safe: the SHA-256
# check skips anything already embedded.
app.ingestion.inbox-folder=file:./docs-inbox
app.ingestion.default-user-id=system
app.ingestion.chunk-size=500
app.ingestion.pages-per-document=1

# Run schema.sql at startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:init/schema.sql

# JPA: schema.sql owns the schema, don't let Hibernate touch it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# File upload limits (50MB per file)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

