spring.application.name=telusko-ai1
spring.ai.openai.api-key=<YOUR_OPENAI_API_KEY>
# Spring Ai creates the chat memory table automatically on startup
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=mysql

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:init/schema.sql
spring.main.allow-bean-definition-overriding=true

#Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/aidb
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.ai.openai.image.options.model=gpt-image-1
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Redis vector store settings
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.ai.vectorstore.redis.index-name=course-index
spring.ai.vectorstore.redis.prefix=course





